<!doctype html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gateway42.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" />
    <style>
        :root {
            --ai-electric: #00b4d8;
            --ai-deep:     #001824;
            --ai-bg:       #0c4a6e;
            --ai-brand:    #002d3c;
            --color-blue-1: #E6F1F4;
            --color-blue-2: #B9D9E0;
            --color-blue-3: #5F8C96;
            --color-red: rgba(220,38,38);
            --color-orange: #fa5005;
            --radius-sm:   4px;
            --radius-md:   12px;
            --radius-lg:   26px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Mulish', Helvetica, sans-serif;
            font-weight: 400;
            min-height: 100vh;
            color: rgba(255,255,255,.9);
            background:
                radial-gradient(ellipse at 15% 60%, rgba(0,180,216,.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(8,80,120,.35) 0%, transparent 55%),
                #0c4a6e;
        }


        /* ── Header ── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .header-inner {
            display: flex;
            align-items: center;
            padding: 4px 20px 4px 4px;
            gap: 10px;
        }

        .header-wordmark {
            display: flex;
            flex-direction: column;
        }

        .header-logo {
            height:40px; 
            padding:4px 8px 4px 4px;
            border-right: 1px solid var(--color-blue-3)
        }

        .header-wordmark .brand {
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        .header-wordmark .tagline {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255,255,255,.55);
            /*
            font-style: italic;
            color: var(--ai-electric);
            */
        }

        /* ── Navigation sidebar ── */
        .sidebar {
            width: 200px;
            background: rgba(0,0,0,.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px 0;
            position: fixed;
            top: 48px;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-nav {
            list-style: none;
            padding: 0px 0px 0px 0px;
            margin: 0;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: block;
            padding: 12px 20px;
            color: rgba(255,255,255,.72);
            text-decoration: none;
            font-size: .9rem;
            transition: all .2s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            background: var(--ai-bg);
            color: #fff;
        }

        .sidebar-nav a.active {
            background: var(--ai-bg);
            color: var(--ai-electric);
            border-left: 3px solid var(--ai-electric);
        }

        /* ── Main content area ── */
        .main-content {
            margin-left: 200px;
            padding: 20px;
            padding-top: 74px;
            width: calc(100% - 200px);
        }

        /* ── Cards ── */
        .card {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: border-color .2s, box-shadow .2s;
        }

        .card-light {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            padding: 24px;
            transition: border-color .2s, box-shadow .2s;
        }

        .card:hover {
            border-color: rgba(0,180,216,.25);
            box-shadow: 0 8px 32px rgba(0,180,216,.08);
        }

        .link {
            color: var(--ai-electric);
            text-decoration: underline;
            font-weight: 600;
        }

        .card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            /*
            color: #fff;
            */
            color: var(--ai-electric);
            margin-bottom: 20px;
        }

        /* ── Status bar inside cards ── */
        .status-bar {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: .8125rem;
            color: rgba(255,255,255,.72);
            margin-bottom: 14px;
        }

        /* ── Inputs ── */
        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="email"] {
            width: 100%;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            font-family: 'Mulish', sans-serif;
            font-size: .875rem;
            color: rgba(255,255,255,.9);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder,
        input[type="number"]::placeholder,
        input[type="email"]::placeholder {
            color: rgba(255,255,255,.38);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus {
            border-color: var(--ai-electric);
            box-shadow: 0 0 0 2px rgba(0,180,216,.2);
        }

        input .input-sm { width: 60px; padding: 3px; }

        label {
            display: block;
            font-size: .8125rem;
            font-weight: 700;
            color: rgba(255,255,255,.72);
            margin-bottom: 5px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            font-family: 'Mulish', sans-serif;
            font-size: .8125rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            border-radius: var(--radius-sm);
            padding: 8px 18px;
            text-decoration: none;
            transition: background .25s, box-shadow .25s;
            line-height: 1.4;
        }

        .btn-small {
            display: inline-block;
            font-family: 'Mulish', sans-serif;
            font-size: .8125rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            text-decoration: none;
            transition: background .25s, box-shadow .25s;
        }

        .btn-primary {
            background: var(--ai-electric);
            color: var(--ai-deep);
        }
        .btn-primary:hover {
            background: #38bdf8;
            box-shadow: 0 0 20px rgba(0,180,216,.4);
        }

        .btn-danger {
            background: rgba(220,38,38,.75);
            color: #fff;
        }
        .btn-danger:hover {
            background: rgba(220,38,38,.95);
            box-shadow: 0 0 16px rgba(220,38,38,.35);
        }

        .btn-warning {
            background: rgba(202,138,4,.8);
            color: #fff;
        }
        .btn-warning:hover {
            background: rgba(202,138,4,1);
            box-shadow: 0 0 16px rgba(202,138,4,.35);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255,255,255,.25);
            color: rgba(255,255,255,.8);
        }
        .btn-ghost:hover {
            border-color: rgba(255,255,255,.55);
            color: #fff;
        }

        /* ── Table ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: var(--radius-sm) !important;
            font-size: .8125rem;
        }

        .data-table th {
            text-align: left;
            padding: 8px 12px;
            font-weight: 700;
            color: rgba(255,255,255,.55);
            text-transform: uppercase;
            font-size: .6875rem;
            letter-spacing: .06em;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }

        .data-table td {
            padding: 9px 12px;
            color: rgba(255,255,255,.85);
            border-bottom: 1px solid rgba(255,255,255,.06);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(255,255,255,.03);
        }

        /* ── Badge ── */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: .6875rem;
            font-weight: 700;
            cursor: pointer;
        }

        .badge-active {
            background: rgba(0,180,216,.18);
            color: #4ade80;
            border: 1px solid rgba(0,180,216,.3);
        }

        .badge-disabled {
            background: rgba(255,255,255,.07);
            color: var(--color-red);
            border: 1px solid rgba(255,255,255,.12);
        }

        /* ── Page title ── */
        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
        }

        /* ── Alert flash messages ── */
        .flash {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: .875rem;
            margin-bottom: 16px;
        }
        .flash-error {
            background: rgba(220,38,38,.15);
            border: 1px solid rgba(220,38,38,.35);
            color: #fca5a5;
        }
        .flash-success {
            background: rgba(0,180,216,.12);
            border: 1px solid rgba(0,180,216,.3);
            color: var(--ai-electric);
        }

        /* ── Layout utilities ── */
        .ml-auto      { margin-left: auto; }
        .content-wrap { max-width: 80%; margin: 0 auto; }
        .centered-page { min-height: 60vh; display: flex; align-items: center; justify-content: center; }
        .flex-row     { display: flex; gap: 10px; flex-wrap: wrap; }

        /* ── Card variants ── */
        .card-mt     { margin-top: 24px; }
        .card-danger { border-color: rgba(220,38,38,.4); }
        .card-danger h2 { color: #fca5a5; }

        /* ── Help sections ── */
        .help-section { margin-top: 24px; }

        /* ── Tables ── */
        .table-wrap  { padding: 0; overflow: hidden; border-radius: var(--radius-sm); }
        .scroll-x    { overflow-x: auto; }
        .table-empty { text-align: center; padding: 40px; color: rgba(255,255,255,.35); }
        .table-count { font-size: .75rem; color: rgba(255,255,255,.35); margin-top: 6px; }

        /* ── Toolbar ── */
        .toolbar       { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

        /* ── Form controls ── */
        label.inline { display: inline; margin: 0; white-space: nowrap; }
        .select-sm {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            color: rgba(255,255,255,.9);
            font-family: 'Mulish', sans-serif;
            font-size: .8125rem;
            cursor: pointer;
            outline: none;
        }
        .form-inline { display: inline; }

        /* ── Pagination ── */
        .pagination { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; }

        /* ── Text utilities ── */
        .text-hint    { font-size: .75rem; color: rgba(255,255,255,.35); white-space: nowrap; }
        .section-desc { font-size: .8125rem; color: rgba(255,255,255,.45); margin-bottom: 14px; }

        /* ── Model tags ── */
        .model-tag {
            font-size: .75rem;
            font-weight: 700;
            padding: 3px 10px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 100px;
            color: rgba(255,255,255,.75);
        }

        /* ── Dialog card ── */
        .dialog-card { width: 100%; max-width: 480px; }

        /* ── Pull progress widget ── */
        .pull-status {
            display: none;
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: var(--radius-sm);
        }
        .pull-status-row  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pull-status-text { font-size: .8125rem; color: rgba(255,255,255,.65); }
        .pull-pct         { font-size: .75rem; font-weight: 700; color: var(--ai-electric); }
        .pull-bar         { height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
        .pull-bar-fill    { height: 100%; background: var(--ai-electric); border-radius: 3px; width: 0%; transition: width .3s ease; }
        .pull-bytes       { font-size: .75rem; color: rgba(255,255,255,.3); margin-top: 6px; }
    </style>
</head>

<body>
    <!-- Navigation sidebar -->
    <nav class="sidebar">
        <ul class="sidebar-nav">
            <li><a href="/admin/panel" class="{{ 'active' if request.path == '/admin/panel' else '' }}">Dashboard</a></li>
            <li><a href="/admin/settings-page" class="{{ 'active' if request.path == '/admin/settings-page' else '' }}">Settings</a></li>
            <li><a href="/admin/logs" class="{{ 'active' if request.path.startswith('/admin/logs') else '' }}">Logs</a></li>
            <li><a href="/admin/help" class="{{ 'active' if request.path == '/admin/help' else '' }}">Help</a></li>
        </ul>
    </nav>

    <!-- Header Bar -->
    <header>
        <div class="header-inner">
            <img src="/images/gw42.png" alt="Gateway42." class="header-logo">
            <div class="header-wordmark">
                <span class="brand">Gateway42.</span>
                <span class="tagline">An opinionated gateway for Ollama.</span>
            </div>
            <div class="ml-auto">
                <form action="/logout" method="get">
                    <button class="btn btn-danger">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
        <div class="content-wrap">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
