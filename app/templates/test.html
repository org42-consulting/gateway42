<!doctype html>
<html>
<head>
    <title>Gateway42 – Test</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700;800&display=swap" />
    <style>
        body {
            font-family: 'Mulish', Helvetica, sans-serif;
            color: rgba(255,255,255,.9);
            min-height: 100vh;
            padding: 40px 24px;
            background:
                radial-gradient(ellipse at 15% 60%, rgba(0,180,216,.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(8,80,120,.35) 0%, transparent 55%),
                #0c4a6e;
        }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        p  { color: rgba(255,255,255,.65); margin-bottom: 20px; }
        .btn {
            display: inline-block;
            font-family: 'Mulish', sans-serif;
            font-size: .8125rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            padding: 8px 18px;
            margin-right: 8px;
            transition: background .25s, box-shadow .25s;
        }
        .btn-primary { background: #00b4d8; color: #001824; }
        .btn-primary:hover { background: #38bdf8; box-shadow: 0 0 20px rgba(0,180,216,.4); }
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255,255,255,.25);
            color: rgba(255,255,255,.8);
        }
        .btn-ghost:hover { border-color: rgba(255,255,255,.55); }
    </style>
</head>
<body>
    <h1>Welcome to the Gateway42</h1>
    <p>This is a test page.</p>
    <button class="btn btn-primary">Save Settings</button>
    <button class="btn btn-primary">Test Connection</button>
    <button class="btn btn-ghost">Subscribe</button>
</body>
</html>
