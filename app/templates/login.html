<!doctype html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gateway42 — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" />
    <style>
        :root {
            --ai-electric: #00b4d8;
            --ai-deep:     #001824;
            --radius-sm:   4px;
            --radius-md:   12px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Mulish', Helvetica, sans-serif;
            font-weight: 400;
            min-height: 100vh;
            color: rgba(255,255,255,.9);
            background:
                radial-gradient(ellipse at 15% 60%, rgba(0,180,216,.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(8,80,120,.35) 0%, transparent 55%),
                #0c4a6e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: var(--radius-md);
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            font-family: 'Mulish', sans-serif;
            font-size: .875rem;
            color: rgba(255,255,255,.9);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="password"]::placeholder { color: rgba(255,255,255,.38); }

        input[type="password"]:focus {
            border-color: var(--ai-electric);
            box-shadow: 0 0 0 2px rgba(0,180,216,.2);
        }

        label {
            display: block;
            font-size: .8125rem;
            font-weight: 700;
            color: rgba(255,255,255,.72);
            margin-bottom: 5px;
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            font-family: 'Mulish', sans-serif;
            font-size: .8125rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            border-radius: var(--radius-sm);
            padding: 10px 18px;
            background: var(--ai-electric);
            color: var(--ai-deep);
            transition: background .25s, box-shadow .25s;
        }

        .btn:hover {
            background: #38bdf8;
            box-shadow: 0 0 20px rgba(0,180,216,.4);
        }

        .flash {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: .875rem;
            margin-bottom: 16px;
        }
        .flash-error {
            background: rgba(220,38,38,.15);
            border: 1px solid rgba(220,38,38,.35);
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div style="display:flex; flex-direction:column; align-items:center; min-width:400px; max-width:90%; margin:40px 0;">
        <img src="/images/gw42-white-transparent.png" alt="Gateway42" style="width:300px;">
        <label style="margin-bottom:26px;">An opinionated gateway for Ollama.</label>
        <div class="card">
            <h1 style="font-size:1.25rem; font-weight:800; color:#fff; ">Admin Login</h1>
            <p style="font-size:.8125rem; color:rgba(255,255,255,.45); margin-bottom:20px;">Warning: Admin access only.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash flash-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}

            <form action="/admin" method="post" class="space-y-4">
                <div>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" autofocus>
                </div>
                <button class="btn" type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
