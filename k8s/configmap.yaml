apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway42-config
  namespace: default
data:
  ADMIN_EMAIL: "admin@example.com"
  OLLAMA_URL: "http://ollama:11434/api/chat"
  DEFAULT_RATE_LIMIT: "10"
  SESSION_TIMEOUT: "3600"
  MAX_MESSAGE_LENGTH: "10000"
  LOG_LEVEL: "INFO"
  OLLAMA_GATEWAY_DB_PATH: "/gateway/db/gateway.db"
  LOG_FILE: "/gateway/logs/gateway.log"
