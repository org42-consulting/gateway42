apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway42
  namespace: default
  labels:
    app: gateway42
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway42
  template:
    metadata:
      labels:
        app: gateway42
    spec:
      containers:
        - name: gateway42
          image: gateway42:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
          envFrom:
            - configMapRef:
                name: gateway42-config
            - secretRef:
                name: gateway42-secret
          volumeMounts:
            - name: db
              mountPath: /gateway/db
            - name: logs
              mountPath: /gateway/logs
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: gateway42-db-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: gateway42-logs-pvc
