apiVersion: v1
kind: Service
metadata:
  name: gateway42
  namespace: default
spec:
  selector:
    app: gateway42
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7000
  type: ClusterIP
---
# Expose externally — replace ClusterIP above with LoadBalancer,
# or use this Ingress with an ingress controller (e.g. nginx-ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway42-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
    - host: gateway42.example.com     # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway42
                port:
                  number: 80
